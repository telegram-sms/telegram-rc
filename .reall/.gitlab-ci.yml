# GitLab CI/CD Configuration for Telegram SMS

stages:
  - changelog
  - build
  - deploy

# ------------------------------------------------------------------------------
# Global Configuration
# ------------------------------------------------------------------------------
default:
  image: alvrme/alpine-android:android-36-jdk21
  timeout: 30m
  interruptible: true

variables:
  OWNER: telegram-sms
  REPO: telegram-rc
  GIT_DEPTH: 0
  GIT_SUBMODULE_STRATEGY: recursive
  GHR_VERSION: "0.17.0"
  # Gradle settings
  GRADLE_USER_HOME: "${CI_PROJECT_DIR}/.gradle"
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"

# Cache configuration for faster builds
cache:
  key:
    files:
      - gradle/wrapper/gradle-wrapper.properties
      - app/build.gradle
    prefix: ${CI_PROJECT_ID}
  paths:
    - .gradle/caches/
    - .gradle/wrapper/
  policy: pull-push

# ------------------------------------------------------------------------------
# Job Templates (Hidden jobs for reuse)
# ------------------------------------------------------------------------------
.setup_environment: &setup_environment
  before_script:
    - |
      set -euo pipefail
      echo "==> Installing dependencies..."
      apk --update --no-cache add git openssl bash curl wget ca-certificates zip unzip
    - |
      echo "==> Setting up keystore..."
      if [ -z "${KEYSTORE:-}" ]; then
        echo "ERROR: KEYSTORE variable is not set"
        exit 1
      fi
      echo -n "${KEYSTORE}" | base64 -d > app/keys.jks
      if [ ! -s app/keys.jks ]; then
        echo "ERROR: Failed to decode keystore"
        exit 1
      fi
    - |
      echo "==> Setting up Android NDK..."
      NDK_VERSION="27.2.12479018"
      if [ ! -d "${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}" ]; then
        echo "Installing NDK ${NDK_VERSION}..."
        yes | sdkmanager --install "ndk;${NDK_VERSION}" || true
      fi
      export ANDROID_NDK_HOME="${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}"
      export PATH="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin:${PATH}"
      echo "NDK installed at: ${ANDROID_NDK_HOME}"
    - |
      echo "==> Configuring git..."
      git config --global user.email "ci-bot@qwe7002.dev"
      git config --global user.name "GitLab CI Bot"
      git config --global http.postBuffer 524288000
    - |
      echo "==> Setting up Gradle..."
      mkdir -p "${GRADLE_USER_HOME}"
      cat >> "${GRADLE_USER_HOME}/gradle.properties" << EOF
      org.gradle.jvmargs=-Xmx2048m -XX:+HeapDumpOnOutOfMemoryError
      org.gradle.parallel=true
      org.gradle.caching=true
      org.gradle.configureondemand=true
      android.ndkVersion=${NDK_VERSION}
      EOF
      chmod +x ./gradlew
    - |
      echo "==> Generating release tag..."
      export RELEASE_TAG="$(date +%Y%m%d%H%M)-${CI_COMMIT_REF_NAME}-${CI_COMMIT_SHORT_SHA}"
      export VERSION_CODE="${CI_PIPELINE_ID}"
      export VERSION_NAME="${RELEASE_TAG}"
      echo "Release Tag: ${RELEASE_TAG}"
      echo "Version Code: ${VERSION_CODE}"

.build_apk:
  script:
    - |
      echo "==> Building APK..."
      ./gradlew clean assembleRelease --stacktrace --no-daemon

.deploy_to_github:
  script:
    - |
      echo "==> Validating GitHub credentials..."
      if [ -z "${GITHUB_ACCESS_KEY:-}" ]; then
        echo "ERROR: GITHUB_ACCESS_KEY is not set"
        exit 1
      fi
    - |
      echo "==> Downloading ghr..."
      GHR_URL="https://github.com/tcnksm/ghr/releases/download/v${GHR_VERSION}/ghr_v${GHR_VERSION}_linux_amd64.tar.gz"
      wget -q --retry-connrefused --waitretry=5 --timeout=30 -t 3 "${GHR_URL}" -O ghr.tar.gz
      tar -xzf ghr.tar.gz
      GHR_BIN="./ghr_v${GHR_VERSION}_linux_amd64/ghr"
      chmod +x "${GHR_BIN}"
    - |
      echo "==> Syncing to GitHub..."
      git push --set-upstream "https://${GITHUB_ACCESS_KEY}@github.com/${OWNER}/${REPO}.git" \
        "HEAD:refs/heads/${CI_COMMIT_REF_NAME}" || {
          echo "WARNING: Failed to push to GitHub, continuing with release..."
        }


# ------------------------------------------------------------------------------
# Changelog Generation (runs on the gemini-tagged runner)
# ------------------------------------------------------------------------------
generate_changelog:
  stage: changelog
  tags:
    - gemini
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
  variables:
    GIT_DEPTH: 0
    GIT_SUBMODULE_STRATEGY: none
  cache: {}
  script:
    - |
      set -euo pipefail
      echo "==> Fetching source repository tags..."
      git remote add source https://github.com/telegram-sms/telegram-rc 2>/dev/null || true
      git fetch source --tags

      echo "==> Resolving latest tag..."
      LATEST_TAG=$(git describe --tags --abbrev=0)
      echo "Latest tag: ${LATEST_TAG}"

      echo "==> Collecting commits since ${LATEST_TAG}..."
      COMMITS=$(git log "${LATEST_TAG}..HEAD" --pretty=format:"%h | %an | %ad | %s" --date=short)
      if [ -z "${COMMITS}" ]; then
        echo "ERROR: No commits since ${LATEST_TAG}"
        exit 1
      fi
      printf '%s\n' "${COMMITS}"

      echo "==> Loading prompt template..."
      PROMPT_FILE=".reall/changelog-prompt.md"
      if [ ! -s "${PROMPT_FILE}" ]; then
        echo "ERROR: Prompt template ${PROMPT_FILE} is missing or empty"
        exit 1
      fi
      PROMPT_TEMPLATE=$(cat "${PROMPT_FILE}")
      FULL_PROMPT="${PROMPT_TEMPLATE}

      Commit History:
      ${COMMITS}"

      echo "==> Generating changelog via gemini CLI..."
      if [ -n "${GEMINI_MODEL:-}" ]; then
        gemini -m "${GEMINI_MODEL}" -p "${FULL_PROMPT}" > CHANGELOG.md
      else
        gemini -p "${FULL_PROMPT}" > CHANGELOG.md
      fi

      if [ ! -s CHANGELOG.md ]; then
        echo "ERROR: gemini CLI produced empty output"
        exit 1
      fi
      echo "==> Generated changelog:"
      cat CHANGELOG.md
  artifacts:
    name: "changelog-${CI_COMMIT_SHORT_SHA}"
    paths:
      - CHANGELOG.md
    expire_in: 1 day
    when: on_success

# ------------------------------------------------------------------------------
# Release Build Job
# ------------------------------------------------------------------------------
build_release:
  stage: build
  needs:
    - job: generate_changelog
      artifacts: true
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
  <<: *setup_environment
  script:
    - !reference [.build_apk, script]
    - !reference [.deploy_to_github, script]
    - |
      git remote add source https://github.com/telegram-sms/telegram-rc
      git fetch source --tags
    - |
      echo "==> Syncing GitHub tags to GitLab..."
      git push origin --tags || {
        echo "WARNING: Failed to push tags to GitLab, continuing..."
      }
    - |
      echo "==> Reading changelog artifact from generate_changelog..."
      if [ ! -s CHANGELOG.md ]; then
        echo "ERROR: CHANGELOG.md artifact is missing or empty"
        exit 1
      fi
      export RELEASE_CHANGELOG=$(cat CHANGELOG.md)
    - |
      echo "==> Creating GitHub release..."
      "${GHR_BIN}" \
        -t "${GITHUB_ACCESS_KEY}" \
        -u "${OWNER}" \
        -r "${REPO}" \
        -n "${RELEASE_TAG}" \
        -b "${RELEASE_CHANGELOG}" \
        "${RELEASE_TAG}" \
        "./app/build/outputs/apk/release/"

# ------------------------------------------------------------------------------
# Manual Debug Build (for testing)
# ------------------------------------------------------------------------------
build_debug:
  stage: build
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
  <<: *setup_environment
  script:
    - |
      echo "==> Building Debug APK..."
      ./gradlew assembleDebug --stacktrace --no-daemon
  artifacts:
    name: "telegram-sms-debug-${CI_COMMIT_SHORT_SHA}"
    paths:
      - app/build/outputs/apk/debug/*.apk
    expire_in: 3 days
    when: on_success
  cache:
    policy: pull
